name: voteng_app
description: VoteNG 2027 — Nigeria Mock Election Social Experiment Platform
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  dio: ^5.4.3
  fl_chart: ^0.68.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  shared_preferences: ^2.3.1
  connectivity_plus: ^6.0.3
  share_plus: ^9.0.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  web_socket_channel: ^3.0.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  image_picker: ^1.1.1
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  flutter_countdown_timer: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/nigeria_geojson/
  fonts:
    - family: PublicSans
      fonts:
        - asset: assets/fonts/PublicSans-Regular.ttf
        - asset: assets/fonts/PublicSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PublicSans-SemiBold.ttf
          weight: 600
